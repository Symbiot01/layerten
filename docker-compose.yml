# LayerTen: backend API + frontend (graph-spy-lens)
# Usage: docker compose up --build
# Backend: http://localhost:8000  Frontend: http://localhost:8080

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    env_file:
      - .env
    # Optional: mount data if you need unified/graph data inside the container
    # volumes:
    #   - ./data:/app/data:ro

  frontend:
    build:
      context: ./graph-spy-lens
      dockerfile: Dockerfile
      args:
        # Point to backend (same host: use service name when in compose, or use host.docker.internal on Mac/Win)
        VITE_API_BASE: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend
